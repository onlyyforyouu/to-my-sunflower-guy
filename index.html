<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
    margin: 0;
    background: white;
    font-family: 'Georgia', serif;
    text-align: center;
    overflow: hidden;
}

.container {
    margin-top: 120px;
}

h1 {
    font-size: 42px;
    color: black;
}

button {
    padding: 12px 28px;
    font-size: 18px;
    background: black;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin-top: 20px;
}

.message {
    margin-top: 25px;
    font-size: 22px;
    opacity: 0;
    transition: opacity 1s ease;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 18px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Heylo mister &lt;3</h1>

    <button onclick="start()">Tap here</button>

    <div id="msg1" class="message">Ik you're going through a tough time.</div>
    <div id="msg2" class="message">But you'll get through this.</div>
    <div id="msg3" class="message">I'm with you ❤</div>
    <div id="msg4" class="message">Have a speedy recovery ♡</div>
    <div id="msg5" class="message">~ From charu 🐇</div>
</div>

<script>
function start() {
    let messages = ["msg1","msg2","msg3","msg4","msg5"];

    messages.forEach((id, index) => {
        setTimeout(() => {
            document.getElementById(id).style.opacity = 1;
        }, index * 2000);
    });
}

// hearts animation
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}, 300);
</script>

</body>
</html>
